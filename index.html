<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SoilNova</title>
<style>
  :root{ --line:#06C755; --bg:#f3f5f2; --card:#fff; --ink:#1c2b1c; --muted:#8a978a;
         --ok:#1d9e75; --ok-bg:#e1f5ee; --warn:#ba7517; --warn-bg:#faeeda; --bad:#a32d2d; --bad-bg:#fceaea; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink)}
  .wrap{max-width:520px;margin:0 auto;padding:14px 14px 32px}
  .center{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .spin{width:34px;height:34px;border:3px solid #d8e0d6;border-top-color:var(--line);border-radius:50%;animation:r 1s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .logo{font-size:21px;font-weight:700}
  .muted{color:var(--muted);font-size:13px;line-height:1.8;margin-top:14px}
  .top{display:flex;align-items:center;gap:9px;padding:6px 4px 12px}
  .dot{width:30px;height:30px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .hello{font-size:12px;color:var(--muted)}
  .name{font-size:15px;font-weight:600;margin:0}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px}
  .tab{flex:0 0 auto;font-size:13px;padding:7px 14px;border-radius:20px;border:1px solid #e3e8df;background:#fff;color:var(--muted);white-space:nowrap}
  .tab.on{background:var(--line);color:#fff;border-color:var(--line)}
  .hero{background:#0f6e56;color:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px}
  .hero .crop{font-size:16px;font-weight:600}
  .hero .upd{font-size:12px;color:#9fe1cb;margin-top:2px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .tile{background:#fff;border-radius:14px;padding:13px 14px}
  .tile .k{font-size:12px;color:var(--muted)}
  .tile .v{font-size:24px;font-weight:600;margin-top:3px}
  .tile .u{font-size:13px;font-weight:400;color:var(--muted)}
  .pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-top:7px}
  .ok{color:var(--ok);background:var(--ok-bg)} .warn{color:var(--warn);background:var(--warn-bg)} .bad{color:var(--bad);background:var(--bad-bg)}
  .chartcard{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
  .chartcard h3{font-size:13px;font-weight:600;margin:0 0 8px;color:var(--ink)}
  .mrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .mbtn{font-size:12px;padding:6px 13px;border-radius:16px;border:1px solid #e3e8df;background:#fff;color:var(--muted)}
  .mbtn.on{background:var(--line);color:#fff;border-color:var(--line)}
  canvas{width:100%!important;height:200px!important}
  .foot{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="center"><div class="spin"></div><p class="muted">読み込んでいます…</p></div>
  <div id="app" style="display:none"></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var LIFF_ID='2010559900-FcTcICFR';
var GAS_API='https://script.google.com/macros/s/AKfycbzaagEpwf0mENB58Jb0LLd42iHdtONRytp2Qhx8BK8mxcEap0EKerpvdkkUa2PnvuVV/exec';
var LINE_TOKEN=null;
var LINE_READY=(typeof liff!=='undefined')?liff.init({liffId:LIFF_ID}).then(function(){
  if(!liff.isLoggedIn()){ liff.login(); return new Promise(function(){}); }
  LINE_TOKEN=liff.getIDToken();
}):Promise.reject(new Error('LIFF SDK 未読込'));

function _jsonp(url){return new Promise(function(res,rej){
  var cb='cb_'+Date.now()+'_'+(_jsonp._n=(_jsonp._n||0)+1);
  var s=document.createElement('script');
  var to=setTimeout(function(){cl();rej(new Error('timeout'));},20000);
  function cl(){clearTimeout(to);try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
  window[cb]=function(d){cl();res(d);};
  s.onerror=function(){cl();rej(new Error('network'));};
  s.src=url+(url.indexOf('?')<0?'?':'&')+'cb='+cb;
  document.body.appendChild(s);
});}
function call(fn){var a=[].slice.call(arguments,1);return LINE_READY.then(function(){
  var url=GAS_API+'?api=call&fn='+encodeURIComponent(fn)+'&args='+encodeURIComponent(JSON.stringify(a))+'&idToken='+encodeURIComponent(LINE_TOKEN||'')+'&_='+Date.now();
  return _jsonp(url).then(function(r){ if(r&&r.ok) return r.result; throw new Error((r&&r.error)||'call_failed'); });
});}

/* ---- 既存ロジックの移植（土壌水分・状態判定） ---- */
var F={t:0,temp:1,soil:2,hum:3,voc:4,pres:5,co2:6,scd_t:7,scd_h:8,rssi:9,esp:10,boot:11,fence:12};
var METRICS={temp:{label:'気温',unit:'℃'},soil:{label:'地温',unit:'℃'},hum:{label:'湿度',unit:'%'},co2:{label:'CO₂',unit:'ppm'},pres:{label:'気圧',unit:'hPa'},voc:{label:'VOC',unit:'kΩ'},scd_t:{label:'気温',unit:'℃'},scd_h:{label:'湿度',unit:'%'},fence:{label:'電柵',unit:'V'}};
var SHOW=['temp','soil','hum','co2'];
function isMoist(d){ if(!d)return false; var c=d.caps||{};
  if(d.soilmode==='temp')return false; if(d.soilmode==='moist')return true; if(d.soilcal)return true;
  if(/水分|moist/i.test((d.crop||'')+' '+(d.name||'')))return true;
  if(c.soil&&!c.temp&&!c.hum&&!c.co2&&!c.fence&&!c.scd_t&&!c.scd_h&&!c.voc&&!c.pres)return true; return false; }
function soilCalOf(d){ var c=d&&d.soilcal; return (c&&c.dry!=null&&c.wet!=null)?{dry:+c.dry,wet:+c.wet}:{dry:2900,wet:1300}; }
function soilPct(raw,d){ if(raw==null)return null; if(d&&d.soilIsPct)return Math.max(0,Math.min(100,Math.round(raw)));
  var c=soilCalOf(d); if(c.dry===c.wet)return null; return Math.max(0,Math.min(100,(c.dry-raw)/(c.dry-c.wet)*100)); }
function tileStatus(k,rv,d,TH){ if(rv==null||!TH)return null;
  var key=k,val=rv; if(k==='soil'&&isMoist(d)){key='moist';val=soilPct(rv,d);}
  var t=TH[key]; if(!t||val==null)return null;
  var lo=(t.min!=null&&t.min>-9000)?t.min:null, hi=(t.max!=null&&t.max<9000)?t.max:null;
  if((lo!=null&&val<lo)||(hi!=null&&val>hi))return{word:'異常',cls:'bad'};
  if(lo!=null&&hi!=null){var m=(hi-lo)*0.12; if(val<lo+m||val>hi-m)return{word:'注意',cls:'warn'};}
  return{word:'良好',cls:'ok'}; }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmt(v,n){return v==null?'—':Number(v).toFixed(n==null?1:n);}
function ago(ms){var s=Math.round((Date.now()-ms)/60000); if(s<1)return'たった今'; if(s<60)return s+'分前'; var h=Math.round(s/60); if(h<24)return h+'時間前'; return Math.round(h/24)+'日前';}

var DEVICES=[],TH=null,sel=0,chart=null,selMetric=null;
function availMetrics(d){ return ['temp','soil','hum','co2'].filter(function(k){return d.caps&&d.caps[k];}); }
function curMetric(d){ var av=availMetrics(d); if(selMetric&&av.indexOf(selMetric)>=0) return selMetric;
  return isMoist(d)?(av.indexOf('soil')>=0?'soil':av[0]):(av.indexOf('temp')>=0?'temp':av[0]); }

function metricVal(d,k){ var last=d.series&&d.series[d.series.length-1]; if(!last)return null; var raw=last[F[k]];
  if(k==='soil'&&isMoist(d))return soilPct(raw,d); return raw; }
function metricMeta(d,k){ var m=METRICS[k]||{label:k,unit:''}; if(k==='soil'&&isMoist(d))return{label:'土壌水分',unit:'%'}; return m; }
function dec(d,k){ return (k==='co2'||k==='fence')?0:((k==='soil'&&isMoist(d))?0:1); }

function el(id){return document.getElementById(id);}
function fail(msg){ el('loading').style.display='none'; el('app').style.display='block';
  el('app').innerHTML='<div class="center"><div class="logo">SoilNova</div><p class="muted" style="white-space:pre-wrap">'+esc(msg)+'</p></div>'; }

function render(){
  var d=DEVICES[sel]; if(!d){ el('app').innerHTML='<div class="center"><p class="muted">表示できるデバイスがありません。</p></div>'; return; }
  var last=d.series&&d.series[d.series.length-1];
  var tabs=DEVICES.length>1 ? '<div class="tabs">'+DEVICES.map(function(x,i){return '<div class="tab'+(i===sel?' on':'')+'" data-i="'+i+'">'+esc(x.crop||x.id)+'</div>';}).join('')+'</div>' : '';
  var tiles=SHOW.filter(function(k){return d.caps&&d.caps[k];}).map(function(k){
    var v=metricVal(d,k), mm=metricMeta(d,k), st=tileStatus(k,(d.series[d.series.length-1]||[])[F[k]],d,TH);
    return '<div class="tile"><div class="k">'+esc(mm.label)+'</div>'
      +'<div class="v">'+fmt(v,dec(d,k))+'<span class="u"> '+esc(mm.unit)+'</span></div>'
      +(st?'<div class="pill '+st.cls+'">'+st.word+'</div>':'')+'</div>';
  }).join('');
  var cm=curMetric(d);
  var mbtns=availMetrics(d).map(function(k){ var mm=metricMeta(d,k); return '<button class="mbtn'+(k===cm?' on':'')+'" data-m="'+k+'">'+esc(mm.label)+'</button>'; }).join('');
  el('app').innerHTML=tabs
    +'<div class="hero"><div class="crop">'+esc(d.crop||d.name||d.id)+'</div>'
      +'<div class="upd">'+(last?('最終更新 '+ago(last[F.t])):'データなし')+'</div></div>'
    +'<div class="grid">'+(tiles||'<div class="tile"><div class="k">センサ</div><div class="v">—</div></div>')+'</div>'
    +'<div class="chartcard"><div class="mrow">'+mbtns+'</div><canvas id="chart"></canvas></div>'
    +'<div class="foot">SoilNova ・ くわしい設定はクラシック画面で</div>';
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(t){ t.onclick=function(){ sel=+t.getAttribute('data-i'); selMetric=null; render(); }; });
  Array.prototype.forEach.call(document.querySelectorAll('.mbtn'),function(b){ b.onclick=function(){ selMetric=b.getAttribute('data-m'); render(); }; });
  drawChart(d, cm);
}

function drawChart(d, pk){
  if(!pk) pk = isMoist(d) ? 'soil' : (d.caps&&d.caps.temp?'temp':(d.caps&&d.caps.soil?'soil':'co2'));
  var mm=metricMeta(d,pk);
  var pts=(d.series||[]).map(function(r){ var raw=r[F[pk]]; var v=(pk==='soil'&&isMoist(d))?soilPct(raw,d):raw; return {x:r[F.t],y:v}; }).filter(function(p){return p.y!=null;});
  var ctx=el('chart'); if(!ctx||!window.Chart)return; if(chart)chart.destroy();
  chart=new Chart(ctx,{type:'line',data:{datasets:[{label:mm.label+'（'+mm.unit+'）',data:pts,borderColor:'#06C755',backgroundColor:'rgba(6,199,85,.08)',borderWidth:2,pointRadius:0,tension:.35,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11}}}},
      scales:{x:{type:'time',time:{unit:'hour'},ticks:{maxTicksLimit:5,font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'#f0f3ee'}}}}});
}

/* ---- 起動 ---- */
call('getMe').then(function(m){
  if(!m || !m.authorized){
    el('loading').style.display='none'; el('app').style.display='block';
    el('app').innerHTML='<div class="center"><div class="dot" style="width:64px;height:64px;background:#f0e1e1;color:#a32d2d;font-size:30px;margin:0 auto 12px">!</div>'
      +'<div class="logo">権限がありません</div><p class="muted">許可された管理者のみ利用できます。</p></div>';
    return Promise.reject('noauth');
  }
  el('loading').innerHTML='<div class="top"><div class="dot">'+esc((m.label||m.name||'S').slice(0,1))+'</div><div><div class="hello">こんにちは</div><p class="name">'+esc(m.label||m.name||'')+' さん</p></div></div><div class="center" style="min-height:50vh"><div class="spin"></div><p class="muted">畑のデータを取得中…</p></div>';
  return Promise.all([call('getData',72), call('getThresholds')]);
}).then(function(res){
  if(!res)return; DEVICES=(res[0]&&res[0].devices)||[]; TH=res[1]||{};
  // 最新データがある順に並べ替え
  DEVICES.sort(function(a,b){ var la=(a.series&&a.series.length)?a.series[a.series.length-1][0]:0; var lb=(b.series&&b.series.length)?b.series[b.series.length-1][0]:0; return lb-la; });
  el('loading').style.display='none'; el('app').style.display='block'; render();
}).catch(function(e){ if(e==='noauth')return; fail('読み込みに失敗しました。\n時間をおいて再度お試しください。\n('+(e&&e.message||e)+')'); });
</script>
</body>
</html>
